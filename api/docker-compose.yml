version: '3.3'

services:
  cacti-api:
    build: .
    container_name: cacti-api
    restart: always
    # network_mode: host membuat container menggunakan network host langsung
    # sehingga DB_HOST=127.0.0.1 bisa terhubung ke MySQL di server yang sama
    # dan port 3001 langsung tersedia di host tanpa perlu mapping
    network_mode: host
    environment:
      - NODE_ENV=production
    env_file:
      - .env
    volumes:
      # Mount direktori RRD Server Cacti Production ke dalam Docker
      - /var/www/html/cacti/rra:/var/www/html/cacti/rra
